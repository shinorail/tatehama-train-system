<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TATEHAMA Train Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="boot">
    <div class="boot-content">
        <div class="spinner"></div>
        <h1 class="boot-logo">TTS<span>-Net</span></h1>
        <div class="line"></div>
        <p class="status-text">SYSTEM READY</p>
        <button id="bootBtn">タッチしてシステムを起動</button>
    </div>
</div>

<div class="lcd" id="lcdDisp">
    <div id="emergencyMsg">
        <div class="emer-box">
            <h1>EMERGENCY STOP</h1>
            <p id="alertTxt"></p>
        </div>
    </div>
    
    <div class="lcd-header">
        <div id="typeBadge" class="type-badge">普通</div>
        <div class="dest-info"><span id="destDisp">---</span> 行</div>
        <div id="clock" class="clock">00:00:00</div>
    </div>

    <div class="lcd-main">
        <div class="next-label-container">
            <span class="next-label-jp">次は</span>
            <span class="next-label-en">Next</span>
        </div>
        <div id="lcdName" class="st-name">準備中</div>
        <div id="lcdEn" class="st-en">Standing by</div>
    </div>

    <div class="route-container">
        <div class="route-map" id="routeMap"></div>
    </div>

    <div class="telop">
        <div class="telop-txt" id="telopTxt">館浜電鉄をご利用いただきありがとうございます。</div>
    </div>
</div>

<div class="panel">
    <div class="control-row main-selects">
        <select id="dirSel"></select>
        <select id="typeSel">
            <option value="local">普通</option>
            <option value="semi">準急</option>
            <option value="s_exp">区急</option>
            <option value="exp">急行</option>
            <option value="r_exp">快急</option>
            <option value="ltd">特急</option>
            <option value="school">🎓 修学旅行</option>
            <option value="extra">📢 臨時</option>
        </select>
        <select id="curStSel"></select>
    </div>

    <div class="control-row" style="display: flex; flex-direction: column; gap: 8px; background: #222; padding: 12px; border-radius: 8px; border: 1px solid #333; margin-bottom: 12px; color: #fff;">
        <div style="display: flex; gap: 10px; align-items: center;">
            <span style="font-size: 0.85rem; width: 80px; color: #aaa;">運行状況種別:</span>
            <select id="infoStatusSel" style="padding: 6px; flex: 1; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px;">
                <option value="delay">⚠️ 一部遅延（ダイヤ乱れ）</option>
                <option value="suspend">❌ 運転見合わせ（見込みあり）</option>
                <option value="plan">🛑 運転休止（計画運休・長期）</option>
            </select>
        </div>

        <div id="timeInputRow" style="display: flex; gap: 10px; align-items: center;">
            <span id="timeLabel" style="font-size: 0.85rem; width: 80px; color: #aaa;">遅延分数:</span>
            <input type="number" id="delayMinInput" value="15" min="1" max="120" style="width: 70px; background: #333; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 4px; text-align: center;">
            <select id="resumeTimeSel" style="padding: 6px; flex: 1; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; display: none;">
                <option value="16時30分頃">16時30分頃</option>
                <option value="17時00分頃">17時00分頃</option>
                <option value="18時00分頃">18時00分頃</option>
                <option value="19時30分頃">19時30分頃</option>
                <option value="終日">終日 (再開の目処立たず)</option>
                <option value="明日以降">明日以降の目処</option>
            </select>
        </div>
        
        <div style="display: flex; gap: 10px; align-items: center;">
            <span style="font-size: 0.85rem; width: 80px; color: #aaa;">事象・理由:</span>
            <select id="delayReasonSel" style="padding: 6px; flex: 1; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px;">
                <optgroup label="【遅延・見合わせの主な理由】" style="background:#222;">
                    <option value="急病人救護活動">👤 急病人救護</option>
                    <option value="安全確認の影響">🔍 安全確認</option>
                    <option value="車両点検の影響">🚃 車両点検</option>
                    <option value="信号装置点検の影響">🚥 信号点検</option>
                    <option value="線路内立ち入りの影響">🚶 線路内立ち入り</option>
                    <option value="架線確認の影響">⚡ 架線確認</option>
                </optgroup>
                <optgroup label="【計画運休・長期災害の理由】" style="background:#222;">
                    <option value="台風接近に伴う計画運休">🌀 台風接近 (計画運休)</option>
                    <option value="大雪の見込みに伴う計画運休">❄️ 大雪予報 (計画運休)</option>
                    <option value="大雨による線路設備被害">🌧️ 線路設備被害 (長期不通)</option>
                    <option value="地震による安全確認">🫨 地震発生</option>
                </optgroup>
            </select>
        </div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <span style="font-size: 0.85rem; width: 80px; color: #aaa;">対象影響区間:</span>
            <select id="delaySectionSel" style="padding: 6px; flex: 1; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px;">
                <option value="館浜〜赤山町">全線 (館浜〜赤山町)</option>
                <option value="館浜〜新野崎">区間 (館浜〜新野崎)</option>
                <option value="新野崎〜赤山町">区間 (新野崎〜赤山町)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <span style="font-size: 0.85rem; width: 80px; color: #aaa;">指令手入力欄:</span>
            <input type="text" id="customDetailInput" placeholder="例：振替輸送は16:15より実施、折返し運転中等" style="padding: 6px; flex: 1; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-size: 0.85rem;">
        </div>
    </div>

    <div class="grid-container">
        <div class="btn-group">
            <button onclick="playAnn('pre')" class="btn-main">🚉 発車案内</button>
            <button onclick="playAnn('next')" class="btn-main">📢 次駅放送</button>
            <button onclick="playAnn('soon')" class="btn-main">🗣 まもなく</button>
            <button id="sideBtn" onclick="toggleSide()" class="btn-sub">🚪 出口: 左</button>
        </div>

        <div class="btn-group">
            <button onclick="toggleMelody()" id="melBtn" class="btn-blue">♪ 発車メロ</button>
            <button onclick="playAnn('chime')" class="btn-blue">🔔 チャイム</button>
            <button onclick="playAnn('door')" class="btn-blue">🚪 扉閉放送</button>
            <button onclick="toggleNight()" class="btn-dark">🌙 夜間モード</button>
        </div>

        <div class="btn-group">
            <button onclick="playAnn('school_greet')" class="btn-pink">🎓 旅行挨拶</button>
            <button onclick="playAnn('accident')" class="btn-orange">⚠️ 急病人</button>
            <button onclick="playAnn('delay')" class="btn-orange">⏳ 遅延詫び</button>
            <button onclick="speechSynthesis.cancel()" class="btn-black">🔇 停止</button>
        </div>

        <div class="btn-group full-width">
            <button onclick="emergency()" class="btn-red">🚨 非常ブレーキ緊急停止</button>
        </div>
    </div>
</div>

<div id="qrFullMonitor">
    <div class="qr-monitor-card">
        <h2>📱 スマートフォン運行情報連携</h2>
        <div class="qr-wrapper">
            <img id="qrImg" src="" alt="QRコード生成中...">
        </div>
        <p class="qr-desc">上記のQRコードをスマートフォンのカメラで読み取ると、リアルタイムの遅延・運行状況が端末に同期されます。</p>
        <button id="closeQrBtn" onclick="closeQrMonitor()">❌ 案内画面を閉じる (操作盤に戻る)</button>
    </div>
</div>

<audio id="melAudio" src="sounds/melody.mp3"></audio>
<audio id="chimeAudio" src="sounds/chime.mp3"></audio>

<script src="stations.js"></script>
<script src="app.js"></script>

<script>
    document.getElementById('infoStatusSel').addEventListener('change', function(e) {
        const val = e.target.value;
        const numInput = document.getElementById('delayMinInput');
        const selInput = document.getElementById('resumeTimeSel');
        const label = document.getElementById('timeLabel');
        
        if(val === 'delay') {
            label.textContent = "遅延分数:";
            numInput.style.display = 'inline-block';
            selInput.style.display = 'none';
        } else if(val === 'suspend') {
            label.textContent = "再開見込:";
            numInput.style.display = 'none';
            selInput.style.display = 'inline-block';
        } else if(val === 'plan') {
            label.textContent = "運行計画:";
            numInput.style.display = 'none';
            selInput.style.display = 'inline-block';
            document.getElementById('resumeTimeSel').value = "終日";
        }
    });
</script>

</body>
</html>
