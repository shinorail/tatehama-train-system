<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>館浜電鉄 運行管理システム 2.0</title>
    <style>
        :root { --bg: #000; --lcd-bg: #fff; --blue: #0044cc; --panel: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }

        /* 起動オーバーレイ */
        #boot { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; border: 10px solid #333; }
        
        /* LCD */
        .lcd { height: 42vh; background: var(--lcd-bg); color: #000; margin: 5px; border-radius: 8px; border: 4px solid #444; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .lcd-header { background: var(--blue); color: #fff; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .type-badge { padding: 4px 15px; border: 2px solid #fff; border-radius: 4px; font-size: 1.5rem; }
        .lcd-main { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .st-name { font-size: 6rem; font-weight: bold; margin: 0; }
        .st-en { font-size: 2.2rem; color: #666; text-transform: uppercase; }

        .route-map { height: 50px; background: #eee; display: flex; align-items: center; padding: 0 10px; gap: 4px; border-top: 1px solid #ccc; }
        .dot { flex: 1; height: 12px; background: #ccc; border-radius: 6px; transition: 0.3s; }
        .dot.stop { background: var(--blue); }
        .dot.active { background: #f00; transform: scaleY(1.5); box-shadow: 0 0 10px #f00; }

        .telop { background: #000; color: #fff; height: 30px; font-size: 1.2rem; overflow: hidden; position: relative; }
        .telop-txt { position: absolute; white-space: nowrap; padding-left: 100%; animation: scroll 15s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        /* 操作パネル */
        .panel { height: 58vh; background: var(--panel); padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; }
        .row { display: flex; gap: 5px; margin-bottom: 5px; }
        select { flex: 1; background: #333; color: #fff; border: 1px solid #555; padding: 12px; font-size: 1rem; border-radius: 4px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; flex-grow: 1; }
        button { background: #444; color: #fff; border: 1px solid #666; font-weight: bold; font-size: 0.75rem; border-radius: 4px; }
        button:active { background: #777; }
        .btn-green { background: #005500; }
        .btn-blue { background: #003366; }
        .btn-red { background: #800; }
        .night-mode { filter: brightness(0.6) contrast(1.1); }
        
        #emergencyMsg { position: absolute; inset:0; background: #900; color: #fff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="boot">
    <h1 style="color:#0f0; font-size: 4rem; margin:0;">SYSTEM READY</h1>
    <p style="font-size: 1.5rem;">画面をクリックして起動してください</p>
</div>

<div class="lcd" id="lcdDisp">
    <div id="emergencyMsg">
        <h1 style="font-size: 4rem; margin:0;">緊急停止</h1>
        <p id="alertTxt" style="font-size: 1.5rem;"></p>
    </div>
    <div class="lcd-header">
        <div id="typeBadge" class="type-badge">普通</div>
        <div style="font-size: 1.6rem;"><span id="destDisp">赤山町</span> 行</div>
        <div id="clock" style="font-family: monospace;">00:00:00</div>
    </div>
    <div class="lcd-main">
        <div style="color: var(--blue); font-weight: bold;">Next Station</div>
        <div id="lcdName" class="st-name">館浜</div>
        <div id="lcdEn" class="st-en">Tatehama</div>
    </div>
    <div class="route-map" id="routeMap"></div>
    <div class="telop"><div class="telop-txt" id="telopTxt">館浜電鉄をご利用いただきありがとうございます。</div></div>
</div>

<div class="panel">
    <div class="row">
        <select id="dirSel"><option value="down">下り (赤山町方面)</option><option value="up">上り (館浜方面)</option></select>
        <select id="typeSel">
            <option value="local">普通</option><option value="semi">準急</option>
            <option value="s_exp">区急</option><option value="exp">急行</option>
            <option value="r_exp">快急</option><option value="ltd">特急</option>
        </select>
    </div>
    <div class="row"><select id="curStSel"></select></div>
    <div class="grid">
        <button onclick="playAnn('pre')" class="btn-green">🚉 発車前</button>
        <button onclick="playAnn('next')" class="btn-green">📢 次駅放送</button>
        <button onclick="playAnn('soon')" class="btn-green">🗣 まもなく</button>
        <button id="sideBtn" onclick="toggleSide()">🚪 出口：左</button>
        <button onclick="toggleMelody()" id="melBtn" class="btn-blue">♪ 発車メロ</button>
        <button onclick="playAnn('chime')" class="btn-blue">🔔 チャイム</button>
        <button onclick="playAnn('door')" class="btn-blue">🚪 扉閉放送</button>
        <button onclick="toggleNight()" style="background:#550;">🌙 夜間</button>
        <button onclick="playAnn('manner')">ℹ️ マナー</button>
        <button onclick="playAnn('wait')">🚥 待避案内</button>
        <button onclick="playAnn('delay')">⚠️ 遅延お詫び</button>
        <button onclick="speechSynthesis.cancel()" style="background:#222;">🔇 停止</button>
        <button onclick="setTelop('駆け込み乗車は大変危険です。おやめください。')" class="btn-red">警告テロップ</button>
        <button onclick="setTelop('本日は館浜電鉄をご利用いただきありがとうございます。')" class="btn-blue" style="grid-column: span 1;">標準テロップ</button>
        <button onclick="emergency()" class="btn-red" style="grid-column: span 2; font-size: 1.2rem;">🚨 非常停止</button>
    </div>
</div>

<audio id="melAudio" src="sounds/melody.mp3"></audio>
<audio id="chimeAudio" src="sounds/chime.mp3"></audio>

<script src="stations.js"></script>
<script src="app.js"></script>
</body>
</html>
